# =====================================================
# Perfil de desarrollo local
# Activar con: SPRING_PROFILES_ACTIVE=dev
# =====================================================

# Base de datos: MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/no_mas_accidentes?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT: clave por defecto solo para desarrollo (en producción se usa variable de entorno)
jwt.secret=${JWT_SECRET:dev-secret-key-cambiar-en-produccion-minimo-256-bits-de-largo-1234567890}

# Logging
logging.level.root=INFO
logging.level.com.example.NoMasAccidentes=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Mostrar SQL formateado en consola
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# CORS abierto para frontend local (Vite por defecto en 5173)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000