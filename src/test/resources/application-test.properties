# =====================================================
# Perfil de pruebas: H2 en memoria (no requiere MySQL)
# Activado autom·ticamente en tests por @ActiveProfiles("test")
# =====================================================

spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crea el schema desde las @Entity (en tests no usamos Flyway)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Flyway desactivado en tests
spring.flyway.enabled=false

# JWT con clave determinista
jwt.secret=test-secret-key-cambiar-en-produccion-minimo-256-bits-de-largo-1234567890
jwt.expiration=3600000

# CORS abierto en tests
app.cors.allowed-origins=*

logging.level.org.hibernate.SQL=WARN
