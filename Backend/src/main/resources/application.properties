
# =====================================================
# Configuración común a todos los perfiles
# Las propiedades específicas de cada ambiente viven en
# application-dev.properties y application-prod.properties.
# Activar perfil con: SPRING_PROFILES_ACTIVE=dev
# =====================================================

spring.application.name=NoMasAccidentes
server.port=8080

# Perfil por defecto cuando no se define SPRING_PROFILES_ACTIVE
spring.profiles.active=dev

# JPA / Hibernate
# validate: Hibernate solo verifica que el schema coincida con las @Entity.
# Toda evolución del schema va por Flyway, NUNCA por ddl-auto=update.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# JWT (la clave real se inyecta por variable de entorno)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# AWS S3 (para informes PDF ? RF34, RF36)
aws.s3.bucket-name=${AWS_S3_BUCKET:}
aws.region=${AWS_REGION:us-east-1}

# Correo (para alertas y notificaciones ? RF29?RF32, RF44)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Springdoc / Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
