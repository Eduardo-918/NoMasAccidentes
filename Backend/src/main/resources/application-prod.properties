# =====================================================
# Perfil de producción (AWS RDS + Secrets Manager)
# Activar con: SPRING_PROFILES_ACTIVE=prod
# =====================================================

# Base de datos: AWS RDS MySQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT: clave obligatoria por variable de entorno (sin default)
jwt.secret=${JWT_SECRET}

# Logging
logging.level.root=WARN
logging.level.com.example.NoMasAccidentes=INFO

# No exponer SQL en producción
spring.jpa.show-sql=false

# CORS: solo el dominio del frontend en CloudFront
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}